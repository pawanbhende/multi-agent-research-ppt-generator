services:
  - type: web
    name: research-ppt-backend
    env: python
    region: oregon
    plan: free
    pythonVersion: "3.11.0"
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"