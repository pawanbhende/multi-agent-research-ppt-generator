version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: research-ppt-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/generated_decks:/app/generated_decks
      - ./backend/logs:/app/logs
    restart: unless-stopped

  # frontend service is added in Phase 4 once the Next.js app is scaffolded
